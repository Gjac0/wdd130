<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Feed Sign Up</title>

    <style>
        * {
            margin: 0;
            
        }
        
        body {
            background: rgb(120, 96, 64);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
        }
        
        #titleContainer{
            background-image: url("images/jesus_feeds_5000.jpeg");
            background-size: cover;
            background-position: center top;
            height: 150px;

            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        h1{
            color: white;
            text-shadow: 2px 1px black;
            position: relative;
        }
        h2{
            text-shadow: 2px 1px black;
            justify-self: center;
            color: white;
            position: relative;
        }

        #formContainer{
            background-color: white;

            border: 8px solid #0D2E7C;
            border-radius: 20px;

            width: 450px;
            height: 600px;

            overflow: hidden;
            position: relative;
        }

        #closeBtn{
            position: absolute;
            top:10px;
            left:10px;
            padding-left: 7px;
            padding-right: 7px;
            font-size: medium;
            font: bold;
            border-radius: 3%;
        }

        #books{
            display: flex;
            gap: 2px;
            align-self: flex-end;
            position: absolute;
            bottom: 0px;
        }

        #books img{
            width: 88px;
            height: 100px;
        }
        h3{
            justify-self: center;
            padding-left: 90px;
            padding-right: 90px;
        }
        
    </style>




</head>

<body>
    <div id="formContainer">
        <div id="titleContainer">
            <button type="button" id="closeBtn">X</button>
            
            <h1>Daily Feed</h1>
            <h2>Scripture a Day</h2>
            
        </div>
        
        <h3>Sign Up for Daily Scripture Feed</h3>
        
        <form id="myForm">
            <label for="username">User Name:</label>
            <input type="text" id="username" name="username" required>
            
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label>Gender:</label>
            <div>
                <input type="radio" id="male" name="gender" value="male" required>
                <label for="male">Male</label>
                <input type="radio" id="female" name="gender" value="female" required>
                <label for="female">Female</label>
            </div>

            <section>
                <input type="checkbox" id="newsletter" name="newsletter">
                <label for="newsletter">Subscribe to newsletter</label>
            </section>

            <section>
                <input type="checkbox" id="conditions" name="conditions" required>
                <label for="conditions">I acknowledge the terms and conditions</label>
            </section>

            <section>
                <button type="submit">Submit</button>
            </section>
        </form>
        <div id="books">
            <img src="images/old_testament.webp" alt="Old Testament">
            <img src="images/new_testament.webp" alt="New Testament">
            <img src="images/book_of_mormon.webp" alt="The Book of Mormon">
            <img src="images/doctrine_and_covenants.webp" alt="Doctrine and Covenants">
            <img src="images/pearl_of_great_price.webp" alt="Pearl of Great Price">

        </div>
    </div>

    <div id="output"></div>

    <script>
        // Here is some Javascript to start looking forward to wdd131
        document.getElementById("closeBtn").addEventListener("click", function () {
            document.getElementById("formContainer").style.display = "none";
         });
        const form = document.getElementById('myForm');
        const output = document.getElementById('output');

        form.addEventListener('submit', function (event) {
            event.preventDefault(); // Stop form from actually submitting

            const formData = new FormData(form);
            const entries = [];

            for (const [key, value] of formData.entries()) {
                if (key == "password") {
                    entries.push(`<strong>${key}</strong>: ${value} (you should probably encrypt the password)`);
                } else {
                    entries.push(`<strong>${key}</strong>: ${value}`);
                }
            }

            output.innerHTML = `
            <br>  
            <h3>Here is the data that would be sent to the server:</h3>
            <ul>
                ${entries.map(item => `<li>${item}</li>`).join('')}
            </ul>
            `;
                });
    </script>

</body>

</html>
