<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apostles Spotlights</title>
    <style>
        /* Insert styles here */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body{
            font: Arial;
            background-color: #E8ECED;

        }
        
        .spotlight{
            border: 6px solid  #FFF;
            border-width: 10px;
            border-radius: 50%;
            height: 150px;
            width: 150px;
            overflow: hidden;
            flex-shrink: 0;
            box-shadow: 0 4px 16px rpga(0,0,0, 0.35);
            background-color: #ccc;
        }
        .spotlight.presidency{
            height: 175px;
            width: 175px;
            align-self: end;
        }
        .spotlight.prophet{
            height: 200px;
            width: 200px;
        }
        
        .spotlight img{
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .spotlight a {
            display: block;
            width: 100%;
            height: 100%;
        }

        .spotlight a img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .background{
            justify-content: center;
            border: 10px solid #000;
            font-family: Arial, sans-serif;
            overflow: hidden;
            background-image: url('images/christus.webp');
            background-position:center;
            max-width: 900px;   
            margin: 20px auto;  
            padding: 30px 20px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;

        }

        .grid-presidency{
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 20px;
        }

        .grid-quorum{
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            justify-content: center;
            gap: 20px;
        }

        h1{
            color: white;
            font-family: 'Lato', sans-serif;
            font-weight: 800;
            color: white;
            text-align: center;
            font-size: 250%;
        }
        h2{
            font-family: 'Lato', sans-serif;
            font-weight: 500;
            text-align: center;
            color: white;
            font-size: 150%;
            padding: 10px;
        }
    </style>
</head>
<body>
    <!-- Insert HTML elements here -->
    <div class="background">
        <!-- First Presidency -->
        <h1>First Presidency</h1>
        <div class="grid-presidency">
                <div class="spotlight presidency">
                    <a href="https://www.churchofjesuschrist.org/learn/people/henry-b-eyring/life-leadership?lang=eng" target="_blank">
                    <img src="images/eyring.webp" alt="President Henry B. Eyring">
                    </a>
                </div>
                <div class="spotlight prophet">
                    <a href="https://www.churchofjesuschrist.org/learn/people/dallin-h-oaks/life-leadership?lang=eng" target="_blank">
                    <img src="images/oaks.webp" alt="President Dallin H. Oaks">
                    </a>
                </div>    
                <div class="spotlight presidency">
                    <a href="https://www.churchofjesuschrist.org/learn/people/d-todd-christofferson/life-leadership?lang=eng" target="_blank">
                    <img src="images/christofferson.webp" alt="President D Todd Christoferson">
                    </a>
                </div>
        </div>
            <!-- Quorum of the twelve -->
        <h2>Quorum of the Twelve Apostles</h2>
        <div class="grid-quorum">
            <div class="spotlight">
                <a href="https://www.churchofjesuschrist.org/learn/dieter-f-uchtdorf?lang=eng" target="_blank">
                <img src="images/uchtdorf.webp" alt="Elder Dieter F. Uchtdorf">
                    </a>
            </div>
            <div class="spotlight">
                <a href="https://www.churchofjesuschrist.org/learn/david-a-bednar?lang=eng" target="_blank">
                <img src="images/bednar.webp" alt="Elder David A. Bednar">
                    </a>
            </div>
            <div class="spotlight"> 
                <a href="https://www.churchofjesuschrist.org/learn/quentin-l-cook?lang=eng" target="_blank">
                <img src="images/cook.webp" alt="Elder Quentin L. Cook">
                    </a>
            </div>
            <div class="spotlight">
                <a href="https://www.churchofjesuschrist.org/learn/neil-l-andersen?lang=eng" target="_blank">
                <img src="images/anderson.webp" alt="Elder Neil L. Andersen">
                    </a>
            </div>
            <div class="spotlight">
                <a href="https://www.churchofjesuschrist.org/learn/ronald-a-rasband?lang=eng" target="_blank">
                <img src="images/rasband.webp" alt="Elder Ronald A. Rasband">
                    </a>
            </div>
            <div class="spotlight">

            <div class="spotlight">

                <img src="images/gong.webp" alt="Elder Gerrit W. Gong">

            </div>
            <div class="spotlight">

            <div class="spotlight">

            </div>
            <div class="spotlight">
                <a href="https://www.churchofjesuschrist.org/learn/gerald-j-causse?lang=eng" target="_blank">
                <img src="images/causse.webp" alt="Elder Gerald Causse">
                    </a>
            </div>
            <div class="spotlight">
                <a href="https://www.churchofjesuschrist.org/learn/clark-g-gilbert?lang=eng" target="_blank">

        </div>
    </div>
</body>
</html>
